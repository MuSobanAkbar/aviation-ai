apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-agent
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: flight-agent 
  template:
    metadata:
      labels:
        app: flight-agent 
    spec:
      containers:
        - name: flight-agent
          image: ghcr.io/musobanakbar/aviation-ai:latest 
          ports:
            - containerPort: 7860 
          env:
            - name: BASE_URL
              value: "https://api.aviationstack.com/v1/flights"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: travel-bot-secret
                  key: GROQ_API_KEY
            - name: AVIATIONSTACK_KEY
              valueFrom:
                secretKeyRef:
                  name: travel-bot-secret
                  key: AVIATIONSTACK_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 7860
            initialDelaySeconds: 15 
            periodSeconds: 10